name: wakapi

services:
  wakapi:
    container_name: wakapi
    image: ghcr.io/muety/wakapi:latest
    init: true
    restart: unless-stopped
    ports:
      - 3000:3000
    user: "1000:1000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DATA_DIR}:/data
    environment:
      WAKAPI_PASSWORD_SALT_FILE: /run/secrets/password_salt
    networks:
      - cloudflare
      - tsdproxy
    labels:
      com.centurylinklabs.watchtower.enable: true
      tsdproxy.enable: "true"
      tsdproxy.name: wakapi
      zero-tunnel.enable: true
      zero-tunnel.subdomain: wakapi
      zero-tunnel.port: 3000
    secrets:
      - source: password_salt
        target: password_salt
        uid: "1000"
        gid: "1000"
        mode: "0400"

secrets:
  password_salt:
    environment: WAKAPI_PASSWORD_SALT

networks:
  default:
    name: wakapi
  cloudflare:
    name: cloudflare_tunnel
    external: true
  tsdproxy:
    name: tsdproxy
    external: true
