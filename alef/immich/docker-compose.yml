name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    networks:
      - default
      - cloudflare
      # - tsdproxy
    env_file:
      - .env
    ports:
      - '2283:2283'
    #   - '127.0.0.1:2283:2283'
    depends_on:
      - redis
      - database
    restart: unless-stopped
    healthcheck:
      disable: false
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "gallery"
      tsdproxy.container_port: 2283
      com.centurylinklabs.watchtower.enable: true
      com.centurylinklabs.watchtower.monitor-only: true
      com.centurylinklabs.watchtower.depends-on: "immich_redis,immich_postgres"

#   immich-machine-learning:
#     container_name: immich_machine_learning
#     # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
#     # Example tag: ${IMMICH_VERSION:-release}-cuda
#     image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
#     # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
#     #   file: hwaccel.ml.yml
#     #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
#     volumes:
#       - model-cache:/cache
#     env_file:
#       - .env
#     restart: unless-stopped
#     healthcheck:
#       disable: false
#     labels:
#       com.centurylinklabs.watchtower.enable: true
#       com.centurylinklabs.watchtower.monitor-only: true
# 
  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # DB_STORAGE_TYPE: 'HDD' # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  model-cache:

networks:
  default:
    name: immich
  cloudflare:
    name: cloudflare-tunnel
    external: true
  # tsdproxy:
    # name: tsdproxy
    # external: true
