name: chartdb

services:
  chartdb:
    container_name: chartdb
    image: ghcr.io/chartdb/chartdb:latest
    restart: always
    networks:
      - cloudflare
    labels:
      com.centurylinklabs.watchtower.enable: true
      zero-tunnel.enable: true
      zero-tunnel.subdomain: diagram
      zero-tunnel.port: 80

networks:
  default:
  cloudflare:
    name: cloudflare_tunnel
    external: true
