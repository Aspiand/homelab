name: backrest
services:
  backrest:
    image: ghcr.io/garethgeorge/backrest:latest
    container_name: backrest
    hostname: backrest
    restart: always
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DATA_DIR}/data:/data
      - ${DATA_DIR}/config:/config
      - ${DATA_DIR}/cache:/cache
      - ${DATA_DIR}/tmp:/tmp
      - /srv:/userdata/srv:ro
    environment:
      - BACKREST_DATA=/data
      - BACKREST_CONFIG=/config/config.json
      - XDG_CACHE_HOME=/cache
      - TMPDIR=/tmp
    networks:
      - tsdproxy
    ports:
      - 9898:9898
    labels:
      tsdproxy.enable: true
      tsdproxy.name: backrest
networks:
  tsdproxy:
    external: true
