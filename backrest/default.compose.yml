name: backrest

x-volumes-base: &volumes-base
  - /etc/localtime:/etc/localtime:ro
  - ${DATA_DIR}/data:/data
  - ${DATA_DIR}/config:/config
  - ${DATA_DIR}/cache:/cache
  - ${DATA_DIR}/tmp:/tmp

x-backrest-base: &backrest-base
  image: ghcr.io/garethgeorge/backrest:latest
  container_name: backrest
  hostname: backrest
  restart: always
  volumes: *volumes-base
  environment:
    - BACKREST_DATA=/data
    - BACKREST_CONFIG=/config/config.json
    - XDG_CACHE_HOME=/cache
    - TMPDIR=/tmp
  ports:
    - 9898:9898
  networks:
    - tsdproxy

services:
  alef:
    <<: *backrest-base
    volumes:
      - *volumes-base
      - /mnt/adata_su650/data/immich:/userdata/immich:ro
    labels:
      tsdproxy.enable: true
      tsdproxy.name: backrest-alef

  agarta:
    <<: *backrest-base
    volumes:
      - *volumes-base
    labels:
      tsdproxy.enable: true
      tsdproxy.name: backrest-agarta

networks:
  tsdproxy:
    name: tsdproxy
    external: true
