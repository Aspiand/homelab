name: networks

services:
  # tailscale:
  #   container_name: tailscale
  #   image: ghcr.io/tailscale/tailscale:latest
  #   hostname: ${TS_HOSTNAME}
  #   network_mode: host
  #   restart: always
  #   environment:
  #     TS_AUTHKEY: ${TS_AUTHKEY}
  #     TS_STATE_DIR: /var/lib/tailscale
  #     TS_USERSPACE: false
  #   volumes:
  #     - ts-authkey:/var/lib/tailscale
  #     - /dev/net/tun:/dev/net/tun
  #   cap_add:
  #    - NET_ADMIN
  #    - SYS_MODULE
  #   labels:
  #     com.centurylinklabs.watchtower.enable: true

  tsdproxy:
    image: almeidapaulopt/tsdproxy:1
    container_name: tsdproxy
    restart: unless-stopped
    networks:
      - tsdproxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config:/config
      - tsdproxy-data:/data
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      TSDPROXY_AUTHKEY: ${TSDPROXY_AUTHKEY}
    # ports:
    #   - 8080:8080

  cloudflare-tunnel:
    image: docker.io/cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    networks:
      - cloudflare
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "10"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # - ./config/hosts:/etc/hosts
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    labels:
      com.centurylinklabs.watchtower.enable: true

  zero-tunnel:
    container_name: zero-tunnel
    image: ghcr.io/aspiand/zero-tunnel:dev
    restart: unless-stopped
    environment:
      ZERO_TUNNEL_DEFAULT_DOMAIN: aspian.my.id
      ZERO_TUNNEL_INTERVAL: 300s
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      com.centurylinklabs.watchtower.enable: true

volumes:
  ts-authkey:
  tsdproxy-data:

networks:
  cloudflare:
    name: cloudflare_tunnel
    driver: bridge

  tsdproxy:
    name: tsdproxy
    driver: bridge
